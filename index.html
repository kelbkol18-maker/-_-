<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic Prayer Times - Prismatic Sage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&family=JetBrains+Mono:wght@300;500&family=Noto+Sans+Arabic:wght@100;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage-deep: #1b261d;
            --sage-mid: #4a5d4e;
            --sage-light: #8fa88e;
            --sage-mist: #c7d1c8;
            --prismatic-glow: rgba(168, 230, 207, 0.15);
            --accent-gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.03);
            --font-main: 'Inter', 'Noto Sans Arabic', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default;
        }

        body {
            background-color: var(--sage-deep);
            color: var(--sage-mist);
            font-family: var(--font-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Topographic Materiality Background */
        .topo-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, var(--sage-mid) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #2a3b2d 0%, transparent 50%),
                linear-gradient(135deg, #161d17 0%, #1b261d 100%);
            overflow: hidden;
        }

        .topo-layer {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1000 1000' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        .prism-light {
            position: absolute;
            width: 600px;
            height: 600px;
            background: conic-gradient(from 180deg at 50% 50%, 
                transparent 0deg, 
                rgba(143, 168, 142, 0.1) 40deg, 
                rgba(168, 230, 207, 0.05) 120deg, 
                transparent 180deg);
            filter: blur(80px);
            animation: rotatePrism 20s linear infinite;
        }

        @keyframes rotatePrism {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Main Container */
        .app-shell {
            width: 90vw;
            max-width: 1200px;
            height: 85vh;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            position: relative;
            z-index: 10;
        }

        /* Sidebar - The Prismatic Monolith */
        .sidebar {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .city-tag {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            color: var(--sage-light);
            margin-bottom: 0.5rem;
            font-family: var(--font-mono);
        }

        .current-time {
            font-size: 5rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, #fff, var(--sage-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: var(--font-mono);
        }

        .hijri-date {
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--sage-mist);
            margin-bottom: 2rem;
        }

        .next-prayer-card {
            background: linear-gradient(145deg, rgba(143, 168, 142, 0.1), transparent);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid rgba(143, 168, 142, 0.2);
        }

        .next-prayer-label {
            font-size: 0.9rem;
            color: var(--sage-light);
        }

        .next-prayer-name {
            font-size: 2rem;
            font-weight: 900;
            margin: 0.5rem 0;
        }

        /* Main Grid - The Topographic Landscape */
        .content-area {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 2rem;
        }

        .header-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 1rem;
        }

        .calendar-strip {
            display: flex;
            gap: 1rem;
        }

        .date-pill {
            padding: 0.5rem 1.2rem;
            border-radius: 100px;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .date-pill.active {
            background: var(--sage-light);
            color: var(--sage-deep);
            font-weight: 700;
        }

        .prayer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .prayer-card {
            position: relative;
            background: var(--glass);
            border-radius: 32px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
        }

        .prayer-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: linear-gradient(180deg, rgba(143, 168, 142, 0.05) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .prayer-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(143, 168, 142, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        .prayer-card:hover::before {
            opacity: 1;
        }

        .prayer-card.active {
            background: linear-gradient(145deg, var(--sage-mid), var(--sage-deep));
            border-color: var(--sage-light);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .prayer-card.active .prayer-time {
            color: #fff;
        }

        .prayer-name {
            font-size: 1.2rem;
            font-weight: 400;
            color: var(--sage-light);
            z-index: 1;
        }

        .prayer-card.active .prayer-name {
            color: var(--sage-mist);
        }

        .prayer-time {
            font-family: var(--font-mono);
            font-size: 2.5rem;
            font-weight: 300;
            margin-top: 1rem;
            z-index: 1;
        }

        .prayer-icon {
            position: absolute;
            bottom: -10px;
            left: -10px;
            font-size: 5rem;
            opacity: 0.03;
            transform: rotate(-15deg);
            white-space: nowrap;
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }
        .stagger-5 { animation-delay: 0.5s; }
        .stagger-6 { animation-delay: 0.6s; }

        /* Arabic Typography adjustments */
        [lang="ar"] {
            letter-spacing: 0;
        }

        .stats-row {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-val {
            font-family: var(--font-mono);
            font-size: 1.2rem;
            color: #fff;
        }

        .stat-lbl {
            font-size: 0.7rem;
            color: var(--sage-light);
            text-transform: uppercase;
        }

        @media (max-width: 1024px) {
            .app-shell { grid-template-columns: 1fr; height: auto; overflow-y: auto; padding: 2rem 0; }
            body { overflow-y: auto; display: block; }
            .prayer-grid { grid-template-columns: 1fr 1fr; }
        }
        
        @media (max-width: 600px) {
            .prayer-grid { grid-template-columns: 1fr; }
            .calendar-strip { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <div class="topo-bg">
        <div class="topo-layer"></div>
        <div class="prism-light" style="top: -10%; left: -10%;"></div>
        <div class="prism-light" style="bottom: -10%; right: -10%; animation-direction: reverse;"></div>
    </div>

    <main class="app-shell">
        <aside class="sidebar">
            <div class="top-meta">
                <div id="city-tag" class="city-tag">جاري التحديد...</div>
                <div id="clock" class="current-time">--:--</div>
                <div id="hijri-date" class="hijri-date">...</div>
                
                <div class="stats-row">
                    <div class="stat-item">
                        <span class="stat-lbl">شروق الشمس</span>
                        <span id="sunrise-time" class="stat-val">--:--</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-lbl">منتصف الليل</span>
                        <span id="midnight-time" class="stat-val">--:--</span>
                    </div>
                </div>
            </div>

            <div class="next-prayer-card">
                <div id="next-prayer-label" class="next-prayer-label">يتم حساب الصلاة القادمة...</div>
                <div id="next-prayer-name" class="next-prayer-name">---</div>
                <div style="width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 1rem; overflow: hidden;">
                    <div id="progress-bar" style="width: 0%; height: 100%; background: var(--sage-light); transition: width 1s linear;"></div>
                </div>
            </div>
        </aside>

        <section class="content-area">
            <header class="header-meta">
                <div id="calendar-strip" class="calendar-strip">
                    </div>
                <h2 style="font-weight: 900; font-size: 1.8rem; letter-spacing: -1px;">الأوقات الشرعية</h2>
            </header>

            <div class="prayer-grid">
                <div id="card-fajr" class="prayer-card stagger-1">
                    <span class="prayer-name">الفجر</span>
                    <span id="time-fajr" class="prayer-time">--:--</span>
                    <div class="prayer-icon">الفجر</div>
                </div>

                <div id="card-dhuhr" class="prayer-card stagger-2">
                    <span class="prayer-name">الظهر</span>
                    <span id="time-dhuhr" class="prayer-time">--:--</span>
                    <div class="prayer-icon">الظهر</div>
                </div>

                <div id="card-asr" class="prayer-card stagger-3">
                    <span class="prayer-name">العصر</span>
                    <span id="time-asr" class="prayer-time">--:--</span>
                    <div class="prayer-icon">العصر</div>
                </div>

                <div id="card-maghrib" class="prayer-card stagger-4">
                    <span class="prayer-name">المغرب</span>
                    <span id="time-maghrib" class="prayer-time">--:--</span>
                    <div class="prayer-icon">المغرب</div>
                </div>

                <div id="card-isha" class="prayer-card stagger-5">
                    <span class="prayer-name">العشاء</span>
                    <span id="time-isha" class="prayer-time">--:--</span>
                    <div class="prayer-icon">العشاء</div>
                </div>

                <div id="card-qiyam" class="prayer-card stagger-6">
                    <span class="prayer-name">الثلث الأخير</span>
                    <span id="time-qiyam" class="prayer-time">--:--</span>
                    <div class="prayer-icon">قيام</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // المتغيرات العامة للاحتفاظ بالبيانات
        let currentTimings = null;
        let qiyamTimeStr = "--:--";
        let countdownInterval = null;

        const prayerIds = ['fajr', 'dhuhr', 'asr', 'maghrib', 'isha'];
        const prayerNames = { 'fajr': 'الفجر', 'dhuhr': 'الظهر', 'asr': 'العصر', 'maghrib': 'المغرب', 'isha': 'العشاء' };

        // 1. تحديث الساعة والدقائق
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. تحديث شريط الأيام (التقويم)
        function updateCalendarStrip() {
            const daysAr = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
            const today = new Date().getDay();
            const strip = document.getElementById('calendar-strip');
            strip.innerHTML = '';
            
            // عرض اليوم السابق، اليوم الحالي، واليومين القادمين
            for (let i = -1; i <= 2; i++) {
                const dayIndex = (today + i + 7) % 7;
                const div = document.createElement('div');
                div.className = `date-pill ${i === 0 ? 'active' : ''}`;
                div.textContent = daysAr[dayIndex];
                strip.appendChild(div);
            }
        }
        updateCalendarStrip();

        // 3. جلب الموقع عبر الـ IP ثم جلب أوقات الصلاة
        async function initApp() {
            try {
                // جلب بيانات الموقع عبر GeoJS (لا تتطلب إذن وتعمل بدقة معقولة للمدينة)
                const geoRes = await fetch('https://get.geojs.io/v1/ip/geo.json');
                const geoData = await geoRes.json();
                
                const lat = geoData.latitude;
                const lng = geoData.longitude;
                const city = geoData.city || geoData.region;
                const country = geoData.country;
                
                document.getElementById('city-tag').textContent = `${city}، ${country}`;

                // جلب أوقات الصلاة من Aladhan
                const date = new Date();
                const timestamp = Math.floor(date.getTime() / 1000);
                const aladhanRes = await fetch(`https://api.aladhan.com/v1/timings/${timestamp}?latitude=${lat}&longitude=${lng}&method=2`);
                const aladhanData = await aladhanRes.json();
                
                currentTimings = aladhanData.data.timings;
                
                // تحديث التاريخ الهجري
                const hijri = aladhanData.data.date.hijri;
                document.getElementById('hijri-date').textContent = `${hijri.day} ${hijri.month.ar} ${hijri.year} هـ`;

                renderTimes();
                
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('city-tag').textContent = "تعذر تحديد الموقع";
            }
        }

        // 4. عرض الأوقات وحساب الثلث الأخير
        function renderTimes() {
            if(!currentTimings) return;

            document.getElementById('sunrise-time').textContent = currentTimings.Sunrise;
            document.getElementById('midnight-time').textContent = currentTimings.Midnight;

            document.getElementById('time-fajr').textContent = currentTimings.Fajr;
            document.getElementById('time-dhuhr').textContent = currentTimings.Dhuhr;
            document.getElementById('time-asr').textContent = currentTimings.Asr;
            document.getElementById('time-maghrib').textContent = currentTimings.Maghrib;
            document.getElementById('time-isha').textContent = currentTimings.Isha;

            // حساب الثلث الأخير: يقسم الليل (من المغرب للفجر) على 3
            qiyamTimeStr = calculateLastThird(currentTimings.Maghrib, currentTimings.Fajr);
            document.getElementById('time-qiyam').textContent = qiyamTimeStr;

            // بدء حلقة الحساب للصلاة القادمة
            if(countdownInterval) clearInterval(countdownInterval);
            updateNextPrayerLogic();
            countdownInterval = setInterval(updateNextPrayerLogic, 1000);
        }

        function calculateLastThird(maghrib, fajr) {
            let [mh, mm] = maghrib.split(':').map(Number);
            let [fh, fm] = fajr.split(':').map(Number);
            
            let maghribDate = new Date();
            maghribDate.setHours(mh, mm, 0, 0);
            
            let fajrDate = new Date();
            fajrDate.setDate(fajrDate.getDate() + 1);
            fajrDate.setHours(fh, fm, 0, 0);
            
            let diffMs = fajrDate - maghribDate;
            let thirdMs = diffMs / 3;
            
            let qiyamDate = new Date(fajrDate.getTime() - thirdMs);
            return `${String(qiyamDate.getHours()).padStart(2, '0')}:${String(qiyamDate.getMinutes()).padStart(2, '0')}`;
        }

        // 5. حساب الصلاة القادمة والبطاقة النشطة وشريط التقدم
        function updateNextPrayerLogic() {
            const now = new Date();
            
            // تحويل أوقات اليوم إلى كائنات Date
            const timeObjects = prayerIds.map(id => {
                let [h, m] = currentTimings[id.charAt(0).toUpperCase() + id.slice(1)].split(':').map(Number);
                let d = new Date();
                d.setHours(h, m, 0, 0);
                return { id: id, name: prayerNames[id], date: d };
            });

            let nextPrayer = null;
            let prevPrayer = null;

            // إيجاد الصلاة القادمة
            for (let i = 0; i < timeObjects.length; i++) {
                if (timeObjects[i].date > now) {
                    nextPrayer = timeObjects[i];
                    prevPrayer = i === 0 ? null : timeObjects[i-1];
                    break;
                }
            }

            // إذا انتهت صلوات اليوم، فالقادمة هي الفجر غداً
            if (!nextPrayer) {
                let tomorrowFajr = new Date(timeObjects[0].date);
                tomorrowFajr.setDate(tomorrowFajr.getDate() + 1);
                nextPrayer = { id: 'fajr', name: 'الفجر', date: tomorrowFajr };
                prevPrayer = timeObjects[4]; // العشاء من اليوم
            } else if (!prevPrayer) {
                // إذا القادمة هي الفجر اليوم، فالسابقة هي عشاء الأمس
                let yesterdayIsha = new Date(timeObjects[4].date);
                yesterdayIsha.setDate(yesterdayIsha.getDate() - 1);
                prevPrayer = { id: 'isha', name: 'العشاء', date: yesterdayIsha };
            }

            // حساب الوقت المتبقي
            let diffMs = nextPrayer.date - now;
            let diffMins = Math.floor(diffMs / 60000);
            let hoursLeft = Math.floor(diffMins / 60);
            let minsLeft = diffMins % 60;

            document.getElementById('next-prayer-name').textContent = `صلاة ${nextPrayer.name}`;
            
            let labelText = "الصلاة القادمة خلال ";
            if(hoursLeft > 0) labelText += `${hoursLeft} ساعة و `;
            labelText += `${minsLeft} دقيقة`;
            document.getElementById('next-prayer-label').textContent = labelText;

            // تحديث شريط التقدم
            let totalDuration = nextPrayer.date - prevPrayer.date;
            let elapsed = now - prevPrayer.date;
            let progressPct = (elapsed / totalDuration) * 100;
            document.getElementById('progress-bar').style.width = `${Math.min(100, Math.max(0, progressPct))}%`;

            // تحديد الكرت النشط (الصلاة الحالية/السابقة)
            document.querySelectorAll('.prayer-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`card-${prevPrayer.id}`).classList.add('active');
        }

        // تأثير البارالاكس بالماوس
        document.addEventListener('mousemove', (e) => {
            const layers = document.querySelectorAll('.prism-light');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            layers.forEach((layer, index) => {
                const speed = (index + 1) * 20;
                layer.style.transform = `translate(${x * speed}px, ${y * speed}px) rotate(${x * 360}deg)`;
            });
        });

        // تشغيل التطبيق
        initApp();
    </script>
</body>
</html>
